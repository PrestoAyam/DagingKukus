<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPAL Nickel Balance</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* Reset margin bawaan browser */
    body {
      margin: 0;
      padding: 0;
      background-color: #060910;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // 1. Ubah import menjadi destructuring dari global objek React
    const { useState, useCallback, useRef } = React;

    /* ── fonts ── */
    (() => {
      const l = document.createElement("link");
      l.rel = "stylesheet";
      l.href = "https://fonts.googleapis.com/css2?family=Share+Tech+Mono:wght@400&family=Barlow:wght@300;400;500;600;700;800&display=swap";
      document.head.appendChild(l);
    })();

    const T = {
      bg:"#060910", s1:"#0a0e1a", s2:"#0f1525", s3:"#141c32",
      s4:"#192240", line:"#1f2e48", line2:"#273a5e",
      t1:"#e0eaff", t2:"#6c8ab8", t3:"#334466",
      mono:"'Share Tech Mono',monospace", sans:"'Barlow',sans-serif",
      mhp:"#10d98c", green:"#4ade80", teal:"#2dd4bf",
      water:"#38bdf8", ore:"#f59e0b", acid:"#ef4444",
      steam:"#a78bfa", lime:"#86efac", red:"#f87171",
      tsf:"#d97706", sea:"#0ea5e9", yellow:"#facc15",
      goethite:"#f97316",   // orange — main Ni host
      chromite:"#dc2626",   // red    — refractory Ni
      gibbsite:"#a78bfa",   // purple — leachable Al-bearing
      hematite:"#94a3b8",   // grey   — minor Ni host
      free:"#22d3a0",       // teal   — free/unleached Ni
    };

    function niCol(pct) {
      if (pct >= 95) return "#10d98c";
      if (pct >= 85) return "#4ade80";
      if (pct >= 70) return "#a3e635";
      if (pct >= 50) return "#facc15";
      if (pct >= 20) return "#fb923c";
      return "#f87171";
    }

    const MINERAL_LIB = {
      "Goethite (FeO·OH)":         { default: 52, min: 40, max: 65, col: T.goethite,
        ni_host_pct: 92,   
        hpal_leach:  97,   
        note: "Host utama Ni — larut hampir sempurna di HPAL 250°C" },
      "Hematite (Fe₂O₃)":          { default:  8, min:  3, max: 15, col: T.t2,
        ni_host_pct:  2,
        hpal_leach:  30,   
        note: "Pembawa Ni minor — leachability rendah" },
      "Gibbsite (Al(OH)₃)":        { default:  6, min:  2, max: 12, col: T.gibbsite,
        ni_host_pct:  2,
        hpal_leach:  95,   
        note: "Fase Al — larut baik, Ni trace" },
      "Chromite (FeCr₂O₄)":        { default:  3, min:  1, max:  6, col: T.chromite,
        ni_host_pct:  3,
        hpal_leach:   0,   
        note: "TIDAK LARUT di HPAL — sumber Ni loss permanen" },
      "Quartz / Silica (SiO₂)":    { default:  5, min:  2, max: 10, col: T.t3,
        ni_host_pct:  0,
        hpal_leach:   0,
        note: "Gangue — tidak membawa Ni" },
      "Residual Silicates":         { default:  4, min:  1, max:  8, col: T.t3,
        ni_host_pct:  1,
        hpal_leach:  40,   
        note: "Silikat sisa — sedikit Ni, leachability bervariasi" },
      "Mn-Oxides (Asbolane/MnO₂)": { default:  2, min:  0, max:  5, col: T.teal,
        ni_host_pct:  0,
        hpal_leach:  90,
        note: "Sumber Co utama — minor Ni" },
    };

    const DEF = {
      ore_feed:          500,    
      ni_grade:          1.30,   
      co_grade:          0.10,   
      ore_moisture:      38,     
      frac_goethite:     52,
      frac_hematite:      8,
      frac_gibbsite:      6,
      frac_chromite:      3,
      frac_quartz:        5,
      frac_residual_sil:  4,
      frac_mn_oxide:      2,
      leach_goethite:    97,
      leach_hematite:    30,
      leach_gibbsite:    95,
      leach_chromite:     0,
      leach_residual_sil:40,
      ccd_wash_eff:      99.5,   
      mhp_precip_eff:    99.5,   
      mhp_battery_split: 70,     
      co_in_mn_oxide_pct: 60,    
      co_leach_mn_oxide:  96,
      co_in_goethite_pct: 40,
      co_leach_goethite:  97,
      uptime_pct:        91,
    };

    function calcMineralNiBalance(p) {
      const ANN = 8760 * (p.uptime_pct / 100);

      const ni_feed_tph   = p.ore_feed * p.ni_grade / 100;  
      const BASE          = ni_feed_tph;

      const minerals = [
        { name: "Goethite",          frac: p.frac_goethite      / 100, ni_host: MINERAL_LIB["Goethite (FeO·OH)"].ni_host_pct      / 100, leach: p.leach_goethite      / 100, col: T.goethite },
        { name: "Hematite",          frac: p.frac_hematite      / 100, ni_host: MINERAL_LIB["Hematite (Fe₂O₃)"].ni_host_pct       / 100, leach: p.leach_hematite      / 100, col: T.t2 },
        { name: "Gibbsite",          frac: p.frac_gibbsite      / 100, ni_host: MINERAL_LIB["Gibbsite (Al(OH)₃)"].ni_host_pct     / 100, leach: p.leach_gibbsite      / 100, col: T.gibbsite },
        { name: "Chromite",          frac: p.frac_chromite      / 100, ni_host: MINERAL_LIB["Chromite (FeCr₂O₄)"].ni_host_pct     / 100, leach: 0,                          col: T.chromite },
        { name: "Quartz",            frac: p.frac_quartz        / 100, ni_host: 0,                                                         leach: 0,                          col: T.t3 },
        { name: "Residual Silicate", frac: p.frac_residual_sil  / 100, ni_host: MINERAL_LIB["Residual Silicates"].ni_host_pct      / 100, leach: p.leach_residual_sil  / 100, col: T.t3 },
        { name: "Mn-Oxide",          frac: p.frac_mn_oxide      / 100, ni_host: 0,                                                         leach: 0,                          col: T.teal },
      ];

      const ni_host_sum = minerals.reduce((s, m) => s + m.ni_host, 0);
      if (ni_host_sum > 0) minerals.forEach(m => m.ni_host = m.ni_host / ni_host_sum);

      let ni_dissolved_total = 0;
      let ni_residue_total   = 0;
      const mineral_ni = minerals.map(m => {
        const ni_in_mineral     = BASE * m.ni_host;           
        const ni_dissolved      = ni_in_mineral * m.leach;    
        const ni_residue        = ni_in_mineral - ni_dissolved;
        ni_dissolved_total     += ni_dissolved;
        ni_residue_total       += ni_residue;
        return { ...m, ni_in_mineral, ni_dissolved, ni_residue,
          ni_in_pct:  ni_in_mineral  / BASE * 100,
          diss_pct:   ni_dissolved   / BASE * 100,
          res_pct:    ni_residue     / BASE * 100,
        };
      });

      const hpal_recovery_pct = (ni_dissolved_total / BASE) * 100;

      const ni_in_pls       = ni_dissolved_total * (p.ccd_wash_eff / 100);
      const ni_ccd_loss     = ni_dissolved_total - ni_in_pls;    

      const ni_in_mhp       = ni_in_pls * (p.mhp_precip_eff / 100);
      const ni_raff_loss    = ni_in_pls - ni_in_mhp;

      const ni_mhp_batt     = ni_in_mhp * (p.mhp_battery_split / 100);
      const ni_mhp_ext      = ni_in_mhp - ni_mhp_batt;

      const ni_tsf_total    = ni_residue_total + ni_ccd_loss;

      const ni_sea          = ni_raff_loss * 0.95; 
      const ni_sludge_tsf   = ni_raff_loss * 0.05; 

      const ni_product      = ni_in_mhp;
      const ni_losses_solid = ni_tsf_total + ni_sludge_tsf;
      const ni_losses_eff   = ni_sea;
      const check           = (ni_product + ni_losses_solid + ni_losses_eff) / BASE * 100;

      const pct = x => x / BASE * 100;

      const co_feed_tph     = p.ore_feed * p.co_grade / 100;
      const co_in_mn_ox     = co_feed_tph * (p.co_in_mn_oxide_pct / 100);
      const co_in_goethite  = co_feed_tph * (p.co_in_goethite_pct / 100);
      const co_diss_mn      = co_in_mn_ox    * (p.co_leach_mn_oxide  / 100);
      const co_diss_goe     = co_in_goethite * (p.co_leach_goethite / 100);
      const co_dissolved    = co_diss_mn + co_diss_goe;
      const co_recovery_pct = co_dissolved / co_feed_tph * 100;

      const ann = {
        ni_feed:    ni_feed_tph    * ANN,
        ni_product: ni_product     * ANN,
        ni_mhp_batt:ni_mhp_batt   * ANN,
        ni_mhp_ext: ni_mhp_ext    * ANN,
        ni_tsf:     (ni_losses_solid) * ANN,
        ni_sea:     ni_sea         * ANN,
        co_feed:    co_feed_tph    * ANN,
        co_product: co_dissolved   * ANN,
        hrs:        ANN,
      };

      return {
        BASE, ni_feed_tph, hpal_recovery_pct,
        mineral_ni,
        ni_dissolved_total, ni_residue_total,
        ni_in_pls, ni_ccd_loss,
        ni_in_mhp, ni_raff_loss,
        ni_mhp_batt, ni_mhp_ext,
        ni_tsf_total, ni_sea, ni_sludge_tsf,
        check, pct,
        co_feed_tph, co_dissolved, co_recovery_pct,
        ann,
        nodes: {
          mineral_processing:  100,
          u201_uf:             100,
          u202_in:             100,
          u202_diss:           pct(ni_dissolved_total),
          u202_solid:          pct(ni_residue_total),
          u203_out:            100,
          u204_pls:            pct(ni_in_pls),
          u204_ccd_loss:       pct(ni_ccd_loss),
          u204_res:            pct(ni_residue_total + ni_ccd_loss),
          mhp_product:         pct(ni_in_mhp),
          mhp_batt:            pct(ni_mhp_batt),
          mhp_ext:             pct(ni_mhp_ext),
          mhp_raff:            pct(ni_raff_loss),
          tsf:                 pct(ni_losses_solid),
          sea:                 pct(ni_sea),
        },
      };
    }

    const S = {
      root: {minHeight:"100vh",background:T.bg,color:T.t1,fontFamily:T.sans,fontSize:13},
      hdr:  {background:T.s1,borderBottom:`1px solid ${T.line}`,padding:"13px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"},
      tabs: {display:"flex",background:T.s1,borderBottom:`1px solid ${T.line}`,overflowX:"auto"},
      tab:  {padding:"8px 15px",cursor:"pointer",fontSize:10,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",border:"none",background:"transparent",fontFamily:T.sans,transition:"all .15s",whiteSpace:"nowrap"},
      wrap: {display:"flex",maxWidth:1440,margin:"0 auto",padding:"12px 14px",gap:12,flexWrap:"wrap"},
      left: {width:256,flexShrink:0,maxHeight:"calc(100vh - 114px)",overflowY:"auto"},
      right:{flex:1,minWidth:480,display:"flex",flexDirection:"column",gap:10},
      grp:  {background:T.s2,border:`1px solid ${T.line}`,borderRadius:6,padding:"9px 11px",marginBottom:8},
      gHd:  {fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:7,display:"flex",justifyContent:"space-between",cursor:"pointer"},
      f:    {marginBottom:6},
      lbl:  {fontSize:9,color:T.t3,marginBottom:2,textTransform:"uppercase",letterSpacing:.7,display:"block"},
      iRow: {display:"flex",alignItems:"center",gap:4},
      inp:  {flex:1,background:T.s3,border:`1px solid ${T.line}`,borderRadius:3,padding:"3px 6px",color:T.t1,fontFamily:T.mono,fontSize:11,outline:"none",width:0},
      unit: {fontSize:9,color:T.t3,minWidth:30,textAlign:"right"},
      card: {background:T.s2,border:`1px solid ${T.line}`,borderRadius:8,padding:"12px 14px"},
      cHd:  {fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:8,display:"flex",alignItems:"center",gap:6},
    };

    function FI({label,name,value,unit,min=0,max,step="any",onChange}){
      return(
        <div style={S.f}>
          <label style={S.lbl}>{label}</label>
          <div style={S.iRow}>
            <input type="number" min={min} max={max} step={step} value={value}
              onChange={e=>onChange(name,parseFloat(e.target.value)||0)} style={S.inp}/>
            <span style={S.unit}>{unit}</span>
          </div>
        </div>
      );
    }
    function G({title,col,children,open:init=true}){
      const[o,setO]=useState(init);
      return(
        <div style={{...S.grp,borderLeft:`3px solid ${col}`}}>
          <div style={{...S.gHd,color:col}} onClick={()=>setO(x=>!x)}>
            {title}<span style={{color:T.t3,fontFamily:T.mono}}>{o?"▾":"▸"}</span>
          </div>
          {o&&children}
        </div>
      );
    }
    function Kpi({label,v,u,col,sm}){
      const fmt=typeof v==="number"?(v>=1000?v.toLocaleString("en",{maximumFractionDigits:0}):v>=10?v.toFixed(2):v.toFixed(4)):v;
      return(
        <div style={{flex:`1 1 ${sm?70:90}px`,background:T.s3,border:`1px solid ${T.line}`,borderRadius:6,padding:"7px 9px",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div style={{fontSize:8,color:T.t3,textTransform:"uppercase",letterSpacing:.7,textAlign:"center",lineHeight:1.3}}>{label}</div>
          <div style={{fontSize:sm?13:16,fontWeight:700,color:col,fontFamily:T.mono}}>{fmt}</div>
          <div style={{fontSize:8,color:T.t3}}>{u}</div>
        </div>
      );
    }
    function Bar({pct,col,h=6,label,sublabel}){
      return(
        <div style={{marginBottom:4}}>
          {(label||sublabel)&&(
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:2}}>
              <span style={{color:T.t2}}>{label}</span>
              <span style={{color:col,fontFamily:T.mono,fontWeight:700}}>{typeof pct==="number"?pct.toFixed(4):pct}%</span>
            </div>
          )}
          <div style={{background:T.s3,borderRadius:3,height:h,overflow:"hidden"}}>
            <div style={{width:`${Math.min(100,Math.max(0,pct))}%`,height:"100%",borderRadius:3,background:col,transition:"width .6s"}}/>
          </div>
          {sublabel&&<div style={{fontSize:8,color:T.t3,marginTop:1}}>{sublabel}</div>}
        </div>
      );
    }
    function Sect({label,col}){
      return(
        <div style={{display:"flex",alignItems:"center",gap:6,margin:"8px 0 4px"}}>
          <div style={{width:2,height:12,background:col,borderRadius:1}}/>
          <span style={{fontSize:9,color:col,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>{label}</span>
          <div style={{flex:1,height:1,background:T.line}}/>
        </div>
      );
    }
    function NiTag({pct,size="md"}){
      const c=niCol(pct);
      const fs=size==="lg"?20:size==="sm"?10:13;
      return(
        <span style={{background:`${c}18`,border:`1.5px solid ${c}`,borderRadius:3,
          padding:"2px 7px",fontFamily:T.mono,fontSize:fs,fontWeight:700,color:c,
          letterSpacing:.5,whiteSpace:"nowrap"}}>
          {pct.toFixed(pct<1?4:pct<10?3:2)}%
        </span>
      );
    }

    function MineralPie({data, size=140}){
      const total = data.reduce((s,d)=>s+d.frac,0)||1;
      let angle = -Math.PI/2;
      const cx=size/2, cy=size/2, r=size*0.40;
      const slices = data.map(d=>{
        const sweep = (d.frac/total)*2*Math.PI;
        const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
        angle+=sweep;
        const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
        const large=sweep>Math.PI?1:0;
        return {path:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z`, col:d.col, name:d.name, pct:(d.frac/total*100)};
      });
      return(
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:"block"}}>
          {slices.map((s,i)=>(
            <path key={i} d={s.path} fill={s.col} stroke={T.bg} strokeWidth="0.8" opacity="0.9"/>
          ))}
          <circle cx={cx} cy={cy} r={r*0.52} fill={T.s2}/>
          <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central"
            fontSize={9} fill={T.t2} fontFamily={T.sans} fontWeight="700">Limonite</text>
        </svg>
      );
    }

    function NiBFD({R}){
      if(!R) return null;
      const n=R.nodes;
      const W=660, cx=230, bw=180;
      const bx0=cx-bw/2;

      const arr=(x1,y1,x2,y2,col=T.t3,w=0.9,dash=false)=>{
        const id=`a${Math.round(x1*5)}${Math.round(y1*5)}${Math.round(x2*5)}${Math.round(y2*5)}`.replace(/-/g,"m");
        return(<g key={id}><defs><marker id={id} viewBox="0 0 8 8" refX="7" refY="4" markerWidth="4" markerHeight="4" orient="auto">
          <path d="M1 1.5L7 4L1 6.5" fill="none" stroke={col} strokeWidth="1.5"/></marker></defs>
          <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={col} strokeWidth={w} strokeDasharray={dash?"5 3":"none"} markerEnd={`url(#${id})`}/></g>);
      };
      const box=(x,y,w,h,code,name,pct_in,pct_out,col,sub)=>{
        const ci=niCol(pct_in), co=niCol(pct_out);
        return(<g key={code}>
          <rect x={x} y={y} width={w} height={h} rx="4" fill={T.s2} stroke={col} strokeWidth="1.2"/>
          <rect x={x+4} y={y+4} width={28} height={14} rx="2" fill={col}/>
          <text x={x+18} y={y+11} textAnchor="middle" dominantBaseline="central" fontSize={8} fill={T.bg} fontFamily={T.sans} fontWeight="700">{code}</text>
          <text x={x+w/2} y={y+h/2-(sub?7:0)} textAnchor="middle" dominantBaseline="central" fontSize={9} fill={T.t1} fontFamily={T.sans} fontWeight="600">{name}</text>
          {sub&&<text x={x+w/2} y={y+h/2+7} textAnchor="middle" dominantBaseline="central" fontSize={7} fill={T.t3} fontFamily={T.sans}>{sub}</text>}
          <rect x={x+3} y={y+h-18} width={52} height={14} rx="2" fill={`${ci}20`} stroke={ci} strokeWidth="0.8"/>
          <text x={x+29} y={y+h-11} textAnchor="middle" dominantBaseline="central" fontSize={8} fill={ci} fontFamily={T.mono} fontWeight="700">IN {pct_in.toFixed(1)}%</text>
          <rect x={x+w-55} y={y+h-18} width={52} height={14} rx="2" fill={`${co}20`} stroke={co} strokeWidth="0.8"/>
          <text x={x+w-29} y={y+h-11} textAnchor="middle" dominantBaseline="central" fontSize={8} fill={co} fontFamily={T.mono} fontWeight="700">OUT {pct_out.toFixed(1)}%</text>
        </g>);
      };
      const pill=(x,y,pct,label,anchor="middle")=>{
        const c=niCol(pct);
        return(<g key={`p${x}${y}`}>
          <rect x={x-(anchor==="middle"?30:anchor==="start"?0:-60)} y={y-8} width={60} height={16} rx={8} fill={`${c}20`} stroke={c} strokeWidth="0.9"/>
          <text x={x+(anchor==="middle"?0:anchor==="start"?30:-30)} y={y+1} textAnchor="middle" dominantBaseline="central" fontSize={8.5} fill={c} fontFamily={T.mono} fontWeight="700">{pct.toFixed(2)}%</text>
          {label&&<text x={x+(anchor==="middle"?0:anchor==="start"?32:-32)+2} y={y+14} textAnchor={anchor} dominantBaseline="central" fontSize={6.5} fill={T.t3} fontFamily={T.sans}>{label}</text>}
        </g>);
      };

      return(
        <svg width="100%" viewBox={`0 0 ${W} 740`} style={{display:"block"}}>
          <rect x={W-165} y={8} width={158} height={72} rx="4" fill={T.s3} stroke={T.line} strokeWidth="0.8"/>
          <text x={W-86} y={21} textAnchor="middle" fontSize={8} fill={T.t2} fontFamily={T.sans} fontWeight="700">WARNA Ni%</text>
          {[[niCol(97),"≥95% — goethite zone"],[niCol(90),"85–95%"],[niCol(75),"70–85%"],[niCol(55),"50–70%"],[niCol(30),"20–50%"],[niCol(5),"<20% — sisa"]].map(([c,l],i)=>(
            <g key={l}><rect x={W-160} y={29+i*9} width={10} height={7} rx="1" fill={c}/><text x={W-144} y={33+i*9} dominantBaseline="central" fontSize={7} fill={T.t2} fontFamily={T.sans}>{l}</text></g>
          ))}

          <rect x={cx-90} y={8} width={180} height={30} rx="4" fill={`${niCol(100)}18`} stroke={niCol(100)} strokeWidth="1.5"/>
          <text x={cx} y={17} textAnchor="middle" dominantBaseline="central" fontSize={8.5} fill={niCol(100)} fontFamily={T.sans} fontWeight="800">MINERAL PROCESSING INPUT</text>
          <text x={cx} y={29} textAnchor="middle" dominantBaseline="central" fontSize={8} fill={T.t2} fontFamily={T.mono}>Ni = 100.00% = {R.ni_feed_tph.toFixed(3)} t Ni/h</text>
          {arr(cx,38,cx,58,niCol(100),1.2)} {pill(cx,51,100,"Feed 100%")}

          {box(bx0,58,bw,42,"201","Slurry Thickening",100,100,T.water,"No Ni separation")}
          {arr(cx,100,cx,120,niCol(100),1.1)} {pill(cx,113,100,"→ HPAL")}

          {box(bx0,120,bw,46,"202","HPAL",100,n.u202_diss,T.acid,`Goethite dissolution @ 250°C`)}
          {arr(bx0,143,bx0-18,143,niCol(n.u202_solid),0.9)}
          <line x1={bx0-18} y1="143" x2={bx0-18} y2="552" stroke={niCol(n.u202_solid)} strokeWidth="0.8" strokeDasharray="5 3"/>
          {arr(bx0-18,552,bx0,552,niCol(n.u202_solid),0.9)}

                            <div style={{display:"flex",gap:6,fontFamily:T.mono}}>
                              <span style={{color:niCol(m.diss_pct)}}>terlarut {m.diss_pct.toFixed(4)}%</span>
                              <span style={{color:T.tsf}}>residu {m.res_pct.toFixed(4)}%</span>
                            </div>
                          </div>
                          <div style={{display:"flex",height:8,borderRadius:3,overflow:"hidden",background:T.s3}}>
                            <div style={{width:`${m.diss_pct}%`,background:m.col,transition:"width .5s"}}/>
                            <div style={{width:`${m.res_pct}%`,background:`${T.tsf}88`,transition:"width .5s"}}/>
                          </div>
                        </div>
                      ))}
                      <div style={{marginTop:8,display:"flex",gap:14,fontSize:9}}>
                        <div style={{display:"flex",gap:4,alignItems:"center"}}><div style={{width:12,height:8,background:T.mhp,borderRadius:2}}/><span style={{color:T.t3}}>= Ni terlarut ke PLS</span></div>
                        <div style={{display:"flex",gap:4,alignItems:"center"}}><div style={{width:12,height:8,background:`${T.tsf}88`,borderRadius:2}}/><span style={{color:T.t3}}>= Ni tetap di residu (TSF)</span></div>
                      </div>
                    </div>

                    <div style={{...S.card,borderLeft:`2px solid ${T.line2}`,fontSize:10,color:T.t3,lineHeight:1.9}}>
                      <b style={{color:T.t2}}>Referensi Mineralogi Limonite:</b><br/>
                      • <b style={{color:T.goethite}}>Goethite 40–65%</b> — host Ni utama via lattice substitution Fe↔Ni. Ni recovery HPAL dari goethite: 95–97% @ 250°C (König 2021, Liu 2021, ScienceDirect 2024)<br/>
                      • <b style={{color:T.chromite}}>Chromite 1–4%</b> — INSOLUBLE sepenuhnya di kondisi HPAL manapun. Cr dan V terkonsentrasi di chromite yang weather-resistant (Nickel Retention by Iron Oxides, ScienceDirect 2000)<br/>
                      • HPAL limonite murni goethite: recovery &gt;97% (Ore 1 dan Ore 2, doiserbia.nb.rs 2025)<br/>
                      • HPAL goethite-dominated ore: generally &gt;95% Ni+Co (Kyle 2010, Thermal pre-treatment ScienceDirect)<br/>
                      • Indonesian limonite (PT Halmahera): Fe 41.15%, Ni 1.35%, dominasi magnetite+goethite (e3sconf ICENIS 2021)<br/>
                      • <b style={{color:T.t1}}>Prinsip utama:</b> Ni tidak pernah hilang di mineral processing. Semua Ni masuk = Ni terlarut (PLS) + Ni di residu padat (TSF). Closure = 100%.
                    </div>
                  </>
                );

                if(tab==="table") return(
                  <>
                    <div style={S.card}>
                      <div style={S.cHd}><span style={{color:T.mhp}}>▐</span> Nickel Balance — Tabel Semua Titik BFD (100% Basis)</div>
                      <div style={{fontSize:9,color:T.t3,marginBottom:8}}>
                        Feed Ni = 100% = {R.ni_feed_tph.toFixed(4)} t Ni/h = {(R.ann.ni_feed/1000).toFixed(2)} kt Ni/yr
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"200px 1fr 90px 80px",
                        fontSize:8,color:T.t3,letterSpacing:1,textTransform:"uppercase",
                        borderBottom:`1px solid ${T.line}`,paddingBottom:4,marginBottom:2}}>
                        <div>Unit / Stream</div>
                        <div>Keterangan</div>
                        <div style={{textAlign:"right"}}>Ni (%)</div>
                        <div style={{textAlign:"right"}}>Ni (t/h)</div>
                      </div>
                      {[
                        {u:"FEED INPUT (=100%)",          desc:"Ni total dalam dry ore",                                     pct:100,                          hi:true},
                        {u:"201 → Thickened U/F",          desc:"Semua Ni ke HPAL, tidak ada separation",                   pct:100},
                        {u:"202 → Dissolved Ni (PLS)",     desc:`Ni terlarut dari goethite+mineral lainnya di HPAL 250°C`,  pct:R.nodes.u202_diss,           hi:true},
                        {u:"202 → Solid Residue",          desc:`Ni dalam chromite (${d.frac_chromite}% ore) + hematite tak terlarut`, pct:R.nodes.u202_solid},
                        {u:"203 → Slurry out",             desc:"Ni tidak berubah melewati neutralisasi",                   pct:100},
                        {u:"204 → PLS (ke MHP-1)",         desc:"Setelah CCD wash — trace loss di wash",                    pct:R.nodes.u204_pls,            hi:true},
                        {u:"204 → CCD wash loss",          desc:"Trace Ni terbawa di wash water → residue",                 pct:R.nodes.u204_ccd_loss},
                        {u:"204 → Residue (ke 211-T)",     desc:"Solid residue + CCD wash loss",                            pct:R.nodes.u204_res},
                        {u:"MHP-1 → MHP PRODUCT",          desc:`Total MHP — ${(R.ni_in_mhp/R.BASE*100).toFixed(2)}% Ni`,  pct:R.nodes.mhp_product,         hi:true},
                        {u:"  MHP Battery Grade",           desc:`${d.mhp_battery_split}% dari MHP product`,                pct:R.nodes.mhp_batt},
                        {u:"  MHP External Sale",           desc:`${100-d.mhp_battery_split}% dari MHP product`,            pct:R.nodes.mhp_ext},
                        {u:"MHP-1 → Raffinate loss",       desc:"Trace Ni tidak terpresipitasi",                            pct:R.nodes.mhp_raff},
                        {u:"211-T → Neut. Residue",        desc:"CCD underflow, Ni tetap di padatan",                       pct:R.nodes.u204_res},
                        {u:"215 → Filter Cake → TSF",      desc:"Residu hematite + chromite — Ni locked",                   pct:R.nodes.tsf,                  hi:true, col:T.tsf},
                        {u:"606 → Discharge to Sea",        desc:"Trace Ni dari effluent treatment",                         pct:R.nodes.sea},
                        {u:"TSF TOTAL",                    desc:"Filter cake + sludge minor",                               pct:R.nodes.tsf+R.pct(R.ni_sludge_tsf), hi:true, col:T.tsf},
                        {u:"CLOSURE CHECK",                desc:"Product + TSF + Sea = ?",                                  pct:R.check, hi:true, col:Math.abs(R.check-100)<0.01?T.green:T.red},
                      ].map((r,i)=>{
                        const tph = R.BASE * r.pct / 100;
                        const c   = r.col || niCol(r.pct);
                        return(
                          <div key={i} style={{display:"grid",gridTemplateColumns:"200px 1fr 90px 80px",
                            alignItems:"center",padding:r.hi?"4px 6px":"2px 0",marginTop:r.hi?2:0,
                            borderRadius:r.hi?3:0,background:r.hi?T.s3:(i%2===0?"transparent":T.s1),
                            borderBottom:`1px solid ${T.bg}`}}>
                            <div style={{fontSize:r.hi?10:9.5,color:r.hi?T.t1:T.t2,fontWeight:r.hi?700:400,
                              paddingLeft:r.u.startsWith("  ")?12:0}}>{r.u}</div>
                            <div style={{fontSize:9,color:T.t3}}>{r.desc}</div>
                            <div style={{textAlign:"right"}}>
                              <NiTag pct={r.pct} size="sm"/>
                            </div>
                            <div style={{textAlign:"right",fontFamily:T.mono,fontSize:9,color:T.t3}}>{tph.toFixed(4)}</div>
                          </div>
                        );
                      })}
                    </div>

                    <div style={S.card}>
                      <div style={S.cHd}><span style={{color:T.teal}}>▐</span> Cobalt Balance</div>
                      <div style={{fontSize:9,color:T.t3,marginBottom:8}}>
                        Co feed = {R.co_feed_tph.toFixed(4)} t Co/h. Co terutama di Mn-oxides (asbolane) dan goethite.
                      </div>
                      {[
                        {l:"Co dalam Mn-oxides (asbolane)", v:d.co_in_mn_oxide_pct, u:"%", c:T.teal},
                        {l:"Co dalam Goethite",              v:d.co_in_goethite_pct, u:"%", c:T.goethite},
                        {l:"Co leach dari Mn-oxides",        v:d.co_leach_mn_oxide,  u:"%", c:T.teal},
                        {l:"Co leach dari Goethite",         v:d.co_leach_goethite,  u:"%", c:T.goethite},
                      ].map(r=>(
                        <div key={r.l} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:`1px solid ${T.bg}`,fontSize:10}}>
                          <span style={{color:T.t2}}>{r.l}</span>
                          <span style={{color:r.c,fontFamily:T.mono,fontWeight:700}}>{r.v.toFixed(1)} {r.u}</span>
                        </div>
                      ))}
                      <div style={{display:"flex",justifyContent:"space-between",padding:"5px 6px",background:T.s3,borderRadius:3,marginTop:4}}>
                        <span style={{fontSize:11,color:T.t1,fontWeight:700}}>Co Recovery Total</span>
                        <NiTag pct={R.co_recovery_pct}/>
                      </div>
                      <div style={{marginTop:4,padding:"5px 6px",background:`${T.teal}10`,borderRadius:3}}>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:10}}>
                          <span style={{color:T.t2}}>Co dissolved</span>
                          <span style={{color:T.teal,fontFamily:T.mono}}>{R.co_dissolved.toFixed(4)} t Co/h</span>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:10}}>
                          <span style={{color:T.t2}}>Co annual (@{d.uptime_pct}% uptime)</span>
                          <span style={{color:T.teal,fontFamily:T.mono}}>{(R.ann.co_product/1000).toFixed(2)} kt Co/yr</span>
                        </div>
                      </div>
                    </div>
                  </>
                );

                if(tab==="annual") return(
                  <>
                    <div style={{...S.card,background:"#030e08",borderLeft:`3px solid ${T.mhp}`}}>
                      <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"center"}}>
                        <div>
                          <div style={{fontSize:9,color:T.t3,textTransform:"uppercase",letterSpacing:1.2,marginBottom:2}}>Annual Nickel</div>
                          <div style={{fontSize:22,fontWeight:800,fontFamily:T.mono,color:T.mhp}}>
                            {(R.ann.ni_product/1000).toFixed(2)} <span style={{fontSize:12,fontWeight:400}}>kt Ni/yr</span>
                          </div>
                          <div style={{fontSize:10,color:T.t3}}>dalam MHP · {R.ann.hrs.toFixed(0)} h/yr · recovery {R.hpal_recovery_pct.toFixed(2)}%</div>
                        </div>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                            {[
                              {l:"Ni feed/yr",    v:R.ann.ni_feed/1000,    c:T.ore,    u:"kt/yr"},
                              {l:"Ni MHP/yr",     v:R.ann.ni_product/1000, c:T.mhp,    u:"kt/yr"},
                              {l:"Ni Battery/yr", v:R.ann.ni_mhp_batt/1000,c:T.green,  u:"kt/yr"},
                              {l:"Ni Ext./yr",    v:R.ann.ni_mhp_ext/1000, c:T.water,  u:"kt/yr"},
                              {l:"Ni TSF/yr",     v:R.ann.ni_tsf/1000,     c:T.tsf,    u:"kt/yr"},
                              {l:"Co Prod./yr",   v:R.ann.co_product/1000, c:T.teal,   u:"kt/yr"},
                            ].map(k=><Kpi key={k.l} label={k.l} v={k.v} u={k.u} col={k.c} sm/>)}
                          </div>
                        </div>
                      </div>
                    </div>

                    <div style={S.card}>
                      <div style={S.cHd}><span style={{color:T.mhp}}>▐</span> Neraca Nickel Tahunan Lengkap</div>
                      <div style={{display:"grid",gridTemplateColumns:"220px 90px 100px 110px",
                        fontSize:8,color:T.t3,letterSpacing:1,textTransform:"uppercase",
                        borderBottom:`1px solid ${T.line}`,paddingBottom:4,marginBottom:2}}>
                        <div>Stream</div>
                        <div style={{textAlign:"right"}}>Ni (%)</div>
                        <div style={{textAlign:"right"}}>t Ni/h</div>
                        <div style={{textAlign:"right"}}>t Ni/yr</div>
                      </div>
                      {[
                        {l:"Ni dalam ore feed (100%)", pct:100,               hi:true, col:T.ore},
                        {l:"HPAL dissolved (ke PLS)",  pct:R.nodes.u202_diss, hi:true, col:T.mhp},
                        {l:"HPAL solid residue",       pct:R.nodes.u202_solid,col:T.tsf},
                        {l:"Ni ke CCD underflow",       pct:R.nodes.u204_res, col:T.tsf},
                        {l:"MHP PRODUCT TOTAL",        pct:R.nodes.mhp_product,hi:true,col:T.green},
                        {l:"  — Battery Grade",         pct:R.nodes.mhp_batt, col:T.green},
                        {l:"  — External Sale",         pct:R.nodes.mhp_ext,  col:T.water},
                        {l:"TSF total (semua residu)",  pct:R.nodes.tsf,      hi:true, col:T.tsf},
                        {l:"Sea discharge (trace)",     pct:R.nodes.sea,       col:T.sea},
                        {l:"CLOSURE (harus = 100%)",    pct:R.check,          hi:true, col:Math.abs(R.check-100)<0.01?T.green:T.red},
                      ].map((r,i)=>{
                        const tph = R.BASE * r.pct / 100;
                        const tpy = tph * R.ann.hrs;
                        const c   = r.col || niCol(r.pct);
                        return(
                          <div key={i} style={{display:"grid",gridTemplateColumns:"220px 90px 100px 110px",
                            alignItems:"center",padding:r.hi?"4px 6px":"2px 0",
                            marginTop:r.hi?2:0,borderRadius:r.hi?3:0,
                            background:r.hi?T.s3:(i%2===0?"transparent":T.s1),
                            borderBottom:`1px solid ${T.bg}`,
                            paddingLeft:r.l.startsWith("  ")?12:r.hi?6:0}}>
                            <div style={{fontSize:r.hi?10:9.5,color:r.hi?T.t1:T.t2,fontWeight:r.hi?700:400}}>{r.l}</div>
                            <div style={{textAlign:"right"}}><NiTag pct={r.pct} size="sm"/></div>
                            <div style={{textAlign:"right",fontFamily:T.mono,fontSize:9,color:T.t3}}>{tph.toFixed(4)}</div>
                            <div style={{textAlign:"right",fontFamily:T.mono,fontSize:10,color:r.hi?c:T.t3,fontWeight:r.hi?700:400}}>
                              {tpy.toLocaleString("en",{maximumFractionDigits:0})}
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    <div style={{...S.card,borderLeft:`2px solid ${T.line2}`,fontSize:10,color:T.t3,lineHeight:1.9}}>
                      <b style={{color:T.t2}}>Catatan Penting:</b><br/>
                      • <b style={{color:T.chromite}}>Ni loss UTAMA = Chromite fraction ({d.frac_chromite}% ore)</b> — sepenuhnya tidak larut di HPAL. Ini satu-satunya "loss" yang nyata secara mineralogi.<br/>
                      • Recovery Ni efektif dihitung: Σ (Ni_hosted_per_mineral × leachability_HPAL) = <b style={{color:niCol(R.hpal_recovery_pct)}}>{R.hpal_recovery_pct.toFixed(2)}%</b><br/>
                      • Semua Ni yang tidak larut = Ni di residu padat → TSF. Ini BUKAN "hilang" — Ni tetap ada di solid.<br/>
                      • Basis: 8,760 h × {d.uptime_pct}% = {R.ann.hrs.toFixed(0)} h/yr operasi
                    </div>
                  </>
                );

                return null;
              })()}
            </div>
          </div>

          <div style={{textAlign:"center",padding:"8px 0 14px",fontSize:9,color:T.t3,letterSpacing:1,textTransform:"uppercase"}}>
            Nickel Balance v2 · Berbasis Mineralogi Limonite · Sumber: König 2021, Liu 2021, ScienceDirect HPAL 2024, doiserbia 2025
          </div>
        </div>
      );
    }

    // 3. Render Aplikasi
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
